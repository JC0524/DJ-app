<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ Mixer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #B8DEF5;
            --bg-card: #FFFFFF;
            --bg-header: #F5C842;
            --accent-red: #E84545;
            --accent-pink: #F2C2D4;
            --accent-mint: #A8E0C8;
            --accent-lavender: #C8B8E8;
            --accent-peach: #F5D4B0;
            --text-primary: #2D2D2D;
            --text-secondary: #6A6A6A;
            --text-dim: #9A9A9A;
            --border-color: #2D2D2D;
            --border-w: 3px;
            --r: 18px;
            --r-sm: 12px;
            --btn-bg: #2D2D2D;
            --btn-text: #FFFFFF;
            --led-green: #5ABF6E;
            --led-amber: #F5A623;
            --led-red: #E84545;
            --led-cyan: #45B5E8;
            --led-magenta: #E845A5;
            --pad-orange: #F58A45;
            --pad-gold: #F5C842;
            --pad-red: #E84545;
            --pad-purple: #9B59B6;
            --pad-green: #5ABF6E;
            --pad-gray: #8E9BAA;
            --pad-blue: #4589E8;
            --pad-pink: #E8459B;
            --subtle: rgba(0,0,0,0.05);
            --subtle-strong: rgba(0,0,0,0.12);
            --font-main: 'Fredoka', 'Noto Sans TC', sans-serif;
            --gap: 8px;
            --pad: 12px;
        }

        .dark {
            --bg-main: #1E2D3D;
            --bg-card: #283848;
            --bg-header: #C89A20;
            --accent-red: #C83838;
            --accent-pink: #7A4A5A;
            --accent-mint: #3A6A4A;
            --accent-lavender: #4A3A6A;
            --accent-peach: #7A5A3A;
            --text-primary: #E8ECF0;
            --text-secondary: #98A8B8;
            --text-dim: #5A6A7A;
            --border-color: #6A8AAA;
            --btn-bg: #E8ECF0;
            --btn-text: #1E2D3D;
            --led-green: #4AAF5E;
            --led-amber: #D59020;
            --led-red: #C83838;
            --led-cyan: #3898C8;
            --led-magenta: #C83898;
            --subtle: rgba(255,255,255,0.07);
            --subtle-strong: rgba(255,255,255,0.14);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; background: var(--bg-main); color: var(--text-primary); font-family: var(--font-main); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--subtle-strong); border-radius: 3px; }

        /* ===== LAYOUT ===== */
        .dj-panel {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--gap);
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            min-height: 100vh;
            min-height: 100dvh;
            padding-bottom: 48px;
        }

        .strip {
            background: var(--bg-card);
            border: var(--border-w) solid var(--border-color);
            border-radius: var(--r);
            padding: var(--pad);
        }

        /* ===== HEADER ===== */
        .hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            min-height: 44px;
            background: var(--bg-header);
            position: relative;
            overflow: visible;
        }
        .hdr::after {
            content: '';
            position: absolute;
            bottom: calc(-1 * var(--gap) / 2 - 2px);
            left: 5%;
            right: 5%;
            height: 3px;
            background: var(--accent-red);
            border-radius: 2px;
        }
        .hdr .logo {
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
            color: var(--text-primary);
        }
        .vu-wrap { display: flex; align-items: center; gap: 4px; }
        .vu-lbl { font-size: 10px; font-weight: 700; color: var(--text-secondary); letter-spacing: 1px; }
        .vu-ch { display: flex; flex-direction: column-reverse; gap: 2px; width: 7px; height: 22px; }
        .vu-s { width: 7px; height: 3px; background: var(--subtle); border-radius: 2px; transition: background 0.06s; }
        .vu-s.g { background: var(--led-green); }
        .vu-s.a { background: var(--led-amber); }
        .vu-s.r { background: var(--led-red); }
        .hdr-right { display: flex; align-items: center; gap: 8px; }
        .lang-switch {
            display: flex; align-items: center;
            background: var(--bg-card); border: var(--border-w) solid var(--border-color);
            border-radius: 22px; padding: 3px; position: relative;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            transition: transform 0.1s;
        }
        .lang-switch:active { transform: scale(0.95); }
        .lang-opt {
            font-family: var(--font-main); font-weight: 700; font-size: 12px;
            color: var(--text-dim); padding: 4px 12px; border-radius: 18px;
            position: relative; z-index: 2; transition: color 0.25s;
            white-space: nowrap; text-align: center; min-width: 38px;
            line-height: 1.3;
        }
        .lang-opt.active { color: var(--btn-text); }
        .lang-slider {
            position: absolute; top: 3px; bottom: 3px;
            background: var(--btn-bg); border-radius: 18px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }
        .st-wrap {
            display: flex; align-items: center; gap: 5px;
            background: var(--accent-peach); border: 2px solid var(--border-color);
            border-radius: var(--r-sm); padding: 4px 10px;
        }
        .st-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); transition: background 0.2s; }
        .st-dot.on { background: var(--led-green); }
        .st-dot.loading { background: var(--led-amber); animation: blink 0.6s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .st-txt { font-size: 10px; font-weight: 700; color: var(--text-primary); letter-spacing: 1px; }
        .st-txt.on { color: var(--led-green); }
        .st-txt.loading { color: var(--led-amber); }

        /* ===== DISPLAY ===== */
        .disp { padding: 14px 16px; }
        .disp-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .trk-name { font-size: 18px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
        .trk-genre { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 2px; margin-top: 2px; }
        .bpm-box {
            text-align: center; flex-shrink: 0; margin-left: 10px;
            background: var(--accent-mint); border: 2px solid var(--border-color);
            border-radius: var(--r-sm); padding: 4px 14px;
        }
        .bpm-val { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .bpm-lbl { font-size: 9px; font-weight: 600; color: var(--text-secondary); letter-spacing: 2px; }

        .wave-wrap {
            position: relative; height: 40px;
            background: var(--subtle); border: 2px solid var(--border-color);
            border-radius: var(--r-sm); margin: 6px 0; overflow: hidden; cursor: pointer;
        }
        #wave-cv { width: 100%; height: 100%; display: block; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 3px; background: var(--led-cyan); border-radius: 2px; left: 0; transition: left 0.1s linear; pointer-events: none; }

        .time-row { display: flex; align-items: center; font-size: 13px; font-weight: 600; }
        .t-cur { color: var(--led-cyan); }
        .t-tot { color: var(--text-dim); }
        .t-bar { flex: 1; height: 8px; background: var(--subtle); margin: 0 8px; border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid var(--subtle-strong); }
        .t-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--led-cyan), var(--led-magenta)); border-radius: 4px; transition: width 0.12s linear; }

        /* ===== TRANSPORT ===== */
        .transport { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 6px var(--pad); }
        .t-btn {
            font-family: var(--font-main); font-weight: 700; font-size: 13px; letter-spacing: 1px;
            color: var(--btn-text); background: var(--btn-bg);
            border: none; border-radius: 25px; padding: 11px 4px;
            cursor: pointer; text-align: center; position: relative;
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .t-btn:active { transform: scale(0.93); }
        .t-btn.play { background: var(--led-green); color: #FFFFFF; }
        .t-btn.play.on { background: var(--led-red); color: #FFFFFF; }
        .t-btn.cue { background: var(--led-amber); color: #FFFFFF; }
        .t-btn .led { position: absolute; top: 5px; right: 7px; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); }
        .t-btn.play .led { background: rgba(255,255,255,0.6); }
        .t-btn.play.on .led { background: rgba(255,255,255,0.6); }

        /* ===== CONTROLS ROW ===== */
        .ctrl-row {
            display: flex;
            align-items: stretch;
            gap: 10px;
            padding: var(--pad);
        }
        .ctrl-jog { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

        .jog {
            width: 100px; height: 100px; border-radius: 50%;
            background: var(--accent-lavender);
            border: var(--border-w) solid var(--border-color);
            position: relative; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none;
            transition: transform 0.08s;
        }
        .jog:active { cursor: grabbing; transform: scale(0.97); }
        .jog::before {
            content: ''; position: absolute; inset: 8px; border-radius: 50%;
            border: 2px dashed var(--subtle-strong);
        }
        .jog-in {
            position: absolute; inset: 22px; border-radius: 50%;
            background: var(--bg-card); border: 2px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
        }
        .jog-in span { font-size: 11px; font-weight: 700; color: var(--text-secondary); }
        .jog-spin { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; }
        .jog-dot {
            position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%;
            border: 1px solid var(--border-color);
        }

        .ctrl-eq { display: flex; flex-direction: column; gap: 8px; justify-content: center; flex: 1; min-width: 0; }
        .eq-item { display: flex; align-items: center; gap: 8px; }
        .eq-lbl { font-weight: 700; font-size: 12px; color: var(--text-secondary); width: 30px; text-align: right; flex-shrink: 0; }
        .eq-slider {
            flex: 1; height: 34px; min-width: 60px;
            background: var(--subtle); border: 2px solid var(--border-color);
            border-radius: 17px; position: relative; cursor: pointer; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
        .eq-sl-fill {
            position: absolute; top: 4px; bottom: 4px;
            background: var(--accent-mint); border-radius: 13px;
            transition: left 0.04s, width 0.04s;
            pointer-events: none;
        }
        .eq-sl-center {
            position: absolute; top: 8px; bottom: 8px; left: 50%;
            width: 2px; background: var(--subtle-strong);
            pointer-events: none;
        }
        .eq-sl-thumb {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--bg-card);
            border: var(--border-w) solid var(--border-color);
            cursor: grab; touch-action: none; pointer-events: none;
        }
        .eq-sl-thumb::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--led-cyan);
        }
        .eq-val { font-size: 11px; font-weight: 600; color: var(--text-secondary); width: 42px; text-align: right; flex-shrink: 0; }

        .ctrl-faders { display: flex; gap: 18px; align-items: center; justify-content: center; flex: 1; }
        .f-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .f-lbl { font-weight: 700; font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; }
        .f-track-wrap {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 44px; height: 120px; cursor: pointer; touch-action: none;
        }
        .f-track {
            width: 10px; height: 100%;
            background: var(--subtle); border: 2px solid var(--border-color);
            border-radius: 6px; position: relative;
            pointer-events: none;
        }
        .f-track-wrap::before {
            content: ''; position: absolute; inset: -8px -6px; z-index: 1;
        }
        .f-fill { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 0 0 4px 4px; transition: height 0.04s; }
        .f-fill.vol-fill { background: linear-gradient(0deg, var(--led-green) 0%, var(--led-amber) 70%, var(--led-red) 100%); }
        .f-fill.spd-fill { background: linear-gradient(0deg, var(--led-cyan) 0%, var(--accent-lavender) 100%); }
        .f-fill.pit-fill { background: linear-gradient(0deg, var(--led-amber) 0%, var(--led-green) 50%, var(--led-amber) 100%); }
        .f-thumb {
            position: absolute; left: 50%; transform: translate(-50%, 50%);
            width: 32px; height: 16px;
            background: var(--bg-card);
            border: var(--border-w) solid var(--border-color);
            border-radius: 8px;
            cursor: grab; touch-action: none; z-index: 2;
        }
        .f-thumb:active { cursor: grabbing; }
        .f-thumb::after { content: ''; position: absolute; top: 50%; left: 6px; right: 6px; height: 2px; background: var(--subtle-strong); transform: translateY(-50%); border-radius: 1px; }
        .f-val { font-size: 12px; font-weight: 700; color: var(--led-green); transition: color 0.15s; }
        .f-val.hot { color: var(--led-amber); }
        .f-val.clip { color: var(--led-red); }
        .f-val.spd-val { color: var(--led-cyan); }
        .f-val.pit-val { color: var(--led-amber); }
        .f-center-mark {
            position: absolute; left: 0; right: 0; bottom: 50%;
            height: 2px; background: var(--subtle-strong);
            pointer-events: none;
        }

        /* ===== RESET BUTTONS ===== */
        .f-rst {
            font-family: var(--font-main); font-weight: 600; font-size: 10px;
            color: var(--text-secondary); background: var(--subtle);
            border: 2px solid var(--border-color); border-radius: 20px;
            padding: 4px 12px; cursor: pointer; white-space: nowrap;
            transition: all 0.1s; min-width: 38px; text-align: center;
            min-height: 28px; display: flex; align-items: center; justify-content: center;
        }
        .f-rst:active { transform: scale(0.93); }
        .f-rst:hover, .f-rst:active { background: var(--subtle-strong); }
        .f-rst.vol-rst:hover, .f-rst.vol-rst:active { color: var(--led-green); border-color: var(--led-green); }
        .f-rst.spd-rst:hover, .f-rst.spd-rst:active { color: var(--led-cyan); border-color: var(--led-cyan); }
        .f-rst.pit-rst:hover, .f-rst.pit-rst:active { color: var(--led-amber); border-color: var(--led-amber); }

        /* ===== FX PADS ===== */
        .pads { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 6px var(--pad); }
        .fx-pad {
            font-family: var(--font-main); font-weight: 700; font-size: 10px; letter-spacing: 0.5px;
            color: var(--text-primary); background: var(--bg-card);
            border: var(--border-w) solid var(--border-color); border-radius: var(--r-sm);
            padding: 10px 4px; cursor: pointer; position: relative;
            transition: transform 0.08s; text-align: center;
            display: flex; align-items: center; justify-content: center; min-height: 42px;
        }
        .fx-pad:active { transform: scale(0.93); }
        .fx-pad .p-led {
            position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 4px; border-radius: 3px;
            background: var(--subtle); transition: all 0.06s;
        }

        .fx-pad[data-c="orange"] .p-led { background: var(--pad-orange); }
        .fx-pad[data-c="gold"] .p-led { background: var(--pad-gold); }
        .fx-pad[data-c="red"] .p-led { background: var(--pad-red); }
        .fx-pad[data-c="purple"] .p-led { background: var(--pad-purple); }
        .fx-pad[data-c="green"] .p-led { background: var(--pad-green); }
        .fx-pad[data-c="gray"] .p-led { background: var(--pad-gray); }
        .fx-pad[data-c="blue"] .p-led { background: var(--pad-blue); }
        .fx-pad[data-c="pink"] .p-led { background: var(--pad-pink); }

        .fx-pad.hit[data-c="orange"] { border-color: var(--pad-orange); background: rgba(245,138,69,0.12); color: var(--pad-orange); }
        .fx-pad.hit[data-c="gold"] { border-color: var(--pad-gold); background: rgba(245,200,66,0.12); color: #B89A20; }
        .fx-pad.hit[data-c="red"] { border-color: var(--pad-red); background: rgba(232,69,69,0.12); color: var(--pad-red); }
        .fx-pad.hit[data-c="purple"] { border-color: var(--pad-purple); background: rgba(155,89,182,0.12); color: var(--pad-purple); }
        .fx-pad.hit[data-c="green"] { border-color: var(--pad-green); background: rgba(90,191,110,0.12); color: var(--pad-green); }
        .fx-pad.hit[data-c="gray"] { border-color: var(--pad-gray); background: rgba(142,155,170,0.12); color: var(--pad-gray); }
        .fx-pad.hit[data-c="blue"] { border-color: var(--pad-blue); background: rgba(69,137,232,0.12); color: var(--pad-blue); }
        .fx-pad.hit[data-c="pink"] { border-color: var(--pad-pink); background: rgba(232,69,155,0.12); color: var(--pad-pink); }

        /* ===== LIBRARY ===== */
        .lib { padding: 8px var(--pad); }
        .lib-lbl { font-weight: 700; font-size: 12px; letter-spacing: 2px; color: var(--text-secondary); text-align: center; margin-bottom: 6px; }
        .lib-scroll { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; max-height: 150px; overflow-y: auto; }
        .lib-card {
            background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: var(--r-sm); padding: 8px 10px;
            cursor: pointer; transition: all 0.12s; position: relative; overflow: hidden;
        }
        .lib-card:hover { background: var(--subtle); }
        .lib-card.on { border-color: var(--led-cyan); background: rgba(69,181,232,0.08); }
        .lib-card.on::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--led-cyan); border-radius: 2px 2px 0 0; }
        .lib-card.on .lc-name { color: var(--led-cyan); }
        .lc-name { font-weight: 700; font-size: 12px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lc-genre { font-size: 10px; font-weight: 600; color: var(--text-dim); letter-spacing: 1px; }
        .lc-led { position: absolute; bottom: 4px; right: 6px; width: 5px; height: 5px; border-radius: 50%; background: var(--subtle-strong); }
        .lib-card.on .lc-led { background: var(--led-cyan); }

        /* ===== DESKTOP ===== */
        @media (min-width: 768px) {
            :root { --gap: 10px; --pad: 14px; }
            .hdr .logo { font-size: 22px; letter-spacing: 2px; }
            .trk-name { font-size: 22px; }
            .bpm-val { font-size: 26px; }
            .wave-wrap { height: 50px; }
            .jog { width: 140px; height: 140px; }
            .jog-in { inset: 30px; }
            .jog-in span { font-size: 13px; }
            .jog-dot { height: 10px; width: 10px; top: 8px; }
            .ctrl-eq { gap: 12px; }
            .eq-slider { height: 38px; border-radius: 19px; }
            .eq-sl-thumb { width: 30px; height: 30px; }
            .eq-lbl { font-size: 13px; width: 34px; }
            .eq-val { font-size: 12px; width: 50px; }
            .eq-item { gap: 10px; }
            .f-track-wrap { height: 160px; width: 48px; }
            .f-thumb { width: 36px; height: 18px; }
            .f-lbl { font-size: 12px; }
            .f-val { font-size: 13px; }
            .f-rst { font-size: 11px; padding: 5px 14px; }
            .ctrl-faders { gap: 22px; }
            .pads { gap: 8px; }
            .fx-pad { font-size: 11px; min-height: 48px; padding: 12px 6px; }
            .t-btn { padding: 12px 4px; font-size: 14px; }
            .lib-scroll { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); max-height: 180px; }
            .lc-name { font-size: 13px; }
        }

        .dev-tag {
            position: fixed;
            bottom: 8px;
            right: 10px;
            font-family: var(--font-main);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
            background: var(--bg-header);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 5px 14px;
            z-index: 100;
        }

        @media (min-width: 1024px) {
            .ctrl-row { gap: 16px; }
            .jog { width: 170px; height: 170px; }
            .jog-in { inset: 38px; }
            .jog-in span { font-size: 14px; }
            .jog-dot { height: 12px; width: 12px; top: 10px; }
            .ctrl-eq { gap: 16px; }
            .eq-slider { height: 42px; border-radius: 21px; }
            .eq-sl-thumb { width: 34px; height: 34px; }
            .eq-lbl { font-size: 14px; width: 38px; }
            .eq-val { font-size: 13px; width: 54px; }
            .eq-item { gap: 14px; }

    <script>
        /* ===== STATE ===== */
        var audioCtx = null, analyser = null, gainNode = null;

        var pitchProc = null;
        var pitchRatio = 1.0;

        /* ===== GRANULAR PITCH SHIFTER ===== */
        var CIRC  = 65536;
        var CMASK = CIRC - 1;
        var GRAIN = 2048;

        function createPitchShifter(ctx) {
            var proc = ctx.createScriptProcessor(4096, 2, 2);

            var cL = new Float32Array(CIRC);
            var cR = new Float32Array(CIRC);
            var wp  = 0;
            var NUM_GRAINS = 4;
            var ph  = new Float32Array(NUM_GRAINS);
            for (var gi = 0; gi < NUM_GRAINS; gi++) {
                ph[gi] = Math.floor(gi * GRAIN / NUM_GRAINS);
            }
            var hannTbl = new Float32Array(GRAIN);
            for (var hi = 0; hi < GRAIN; hi++) {
                hannTbl[hi] = 0.5 * (1 - Math.cos(6.283185307 * hi / GRAIN));
            }
            var curRatio = 1.0;
            var SMOOTH   = 0.002;

            proc.onaudioprocess = function (e) {
                var iL = e.inputBuffer.getChannelData(0);
                var iR = e.inputBuffer.numberOfChannels > 1
                       ? e.inputBuffer.getChannelData(1) : iL;
                var oL = e.outputBuffer.getChannelData(0);
                var oR = e.outputBuffer.numberOfChannels > 1
                       ? e.outputBuffer.getChannelData(1) : oL;
                var len = iL.length;
                var targetR = pitchRatio;

                for (var i = 0; i < len; i++) {
                    curRatio += (targetR - curRatio) * SMOOTH;
                    var r = curRatio;

                    cL[wp] = iL[i];
                    cR[wp] = iR[i];

                    var sL = 0, sR = 0;

                    for (var g = 0; g < NUM_GRAINS; g++) {
                        var w = hannTbl[ph[g]];

                        var rp = wp - GRAIN + ph[g] * (r - 1);
                        var ri = Math.floor(rp);
                        var rf = rp - ri;
                        var a  = ri & CMASK;
                        var b  = (ri + 1) & CMASK;

                        sL += (cL[a] + (cL[b] - cL[a]) * rf) * w;
                        sR += (cR[a] + (cR[b] - cR[a]) * rf) * w;

                        ph[g]++;
                        if (ph[g] >= GRAIN) ph[g] = 0;
                    }

                    oL[i] = sL * 0.5;
                    oR[i] = sR * 0.5;
                    wp = (wp + 1) & CMASK;
                }
            };

            return proc;
        }

            { name: "VICTORY", url: "https://pfst.cf2.poecdn.net/base/audio/fa19de5f635df203958da63d1b51d124d3c1572f8f86b5649cf39d28ee1cf2ee", c: "gold" },

            { name: "RISE", url: "https://pfst.cf2.poecdn.net/base/audio/7efe0f5e7e892a4623417e579b2bf67c7d9579aae92f29a30354e0c57c519f01", c: "blue" }
        ];

        /* ===== AUDIO ENGINE  ===== */
        function initEngine() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;

                gainNode = audioCtx.createGain();
                gainNode.gain.value = calcGain(vol);

                hiF = audioCtx.createBiquadFilter(); hiF.type = 'highshelf'; hiF.frequency.value = 3200; hiF.gain.value = 0;
                midF = audioCtx.createBiquadFilter(); midF.type = 'peaking'; midF.frequency.value = 1000; midF.Q.value = 0.7; midF.gain.value = 0;
                loF = audioCtx.createBiquadFilter(); loF.type = 'lowshelf'; loF.frequency.value = 320; loF.gain.value = 0;

                pitchProc = createPitchShifter(audioCtx);

                audio = new Audio();
                audio.crossOrigin = 'anonymous';
                audio.loop = true;

                audio.preservesPitch = true;
                if (audio.preservesPitch === undefined) {
                    audio.mozPreservesPitch = true;
                    audio.webkitPreservesPitch = true;
                }

                srcNode = audioCtx.createMediaElementSource(audio);

                srcNode.connect(pitchProc);
                pitchProc.connect(loF);
                loF.connect(midF);
                midF.connect(hiF);
                hiF.connect(analyser);
                analyser.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            } catch (e) {
                console.error('Audio init: ' + e.message);
                audio = new Audio();
                audio.loop = true;
            }
        }
        function resumeCtx() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }

        /* ===== PLAYBACK ===== */
        async function loadTrack(i) {
            initEngine(); resumeCtx();
            if (playing) { audio.pause(); playing = false; }
            curIdx = i;
            var tr = tracks[i];
            document.getElementById('trk-name').textContent = tr.name;
            document.getElementById('trk-genre').textContent = t(tr.genre);
            document.getElementById('bpm-val').textContent = tr.bpm;
            genWF(tr.name);
            audio.src = tr.url;
            var g = calcGain(vol);
            if (tr.name === 'Classical') g = g * 8;
            if (gainNode) gainNode.gain.value = g; else audio.volume = Math.min(1, g);
            audio.playbackRate = speed;
            audio.onloadedmetadata = function() { document.getElementById('t-tot').textContent = fmt(audio.duration); };
            audio.ontimeupdate = function() {
                if (!audio.duration) return;
                var p = (audio.currentTime / audio.duration) * 100;
                document.getElementById('t-fill').style.width = p + '%';
                document.getElementById('ph').style.left = p + '%';
                document.getElementById('t-cur').textContent = fmt(audio.currentTime);
            };
            audio.onerror = function() {
                playing = false;
                document.getElementById('trk-name').textContent = t('loadError');
                document.getElementById('trk-genre').textContent = t('trackUnavail');

            try { await audio.play(); playing = true; } catch (e) { playing = false; }

        }

        function togglePlay() {
            if (!audio || curIdx < 0) return; resumeCtx();
            if (playing) { audio.pause(); playing = false; } else { audio.play(); playing = true; startVis(); }

        function cue() { if (!audio || curIdx < 0) return; audio.currentTime = 0; document.getElementById('t-fill').style.width = '0%'; document.getElementById('ph').style.left = '0%'; document.getElementById('t-cur').textContent = '0:00'; }
        function prev() { if (!tracks.length) return; loadTrack(curIdx <= 0 ? tracks.length - 1 : curIdx - 1); }
        function next() { if (!tracks.length) return; loadTrack((curIdx + 1) % tracks.length); }

        function updTransport() {
            var b = document.getElementById('b-play');
            var d = document.getElementById('st-dot');
            var s = document.getElementById('st-txt');
            if (playing) {
                b.innerHTML = t('pause') + '<span class="led"></span>'; b.classList.add('on');
                d.classList.add('on'); s.textContent = t('playing'); s.classList.add('on');

                b.innerHTML = t('play') + '<span class="led"></span>'; b.classList.remove('on');
                d.classList.remove('on'); s.classList.remove('on');
                s.textContent = curIdx >= 0 ? t('paused') : t('standby');
            }
        }

        /* ===== VOLUME ===== */
        function calcGain(fader) {
            return fader * fader * MAX_GAIN;
        }
        function setVol(v) {
            vol = Math.max(0, Math.min(1, v));
            var g = calcGain(vol);
            if (curIdx >= 0 && tracks[curIdx].name === 'Classical') g = g * 8;
            if (gainNode) gainNode.gain.value = g; else if (audio) audio.volume = Math.min(1, g);
            var pct = Math.round(g * 100);
            var lbl = document.getElementById('fv-vol');
            lbl.textContent = pct + '%';
            lbl.classList.remove('hot', 'clip');
            if (pct > 200) lbl.classList.add('clip');
            else if (pct > 100) lbl.classList.add('hot');
            updFader('vol', vol);
        }

        /* ===== SPEED ===== */
        function setSpeed(v) {
            speed = Math.max(0.5, Math.min(2, v));
            if (audio) audio.playbackRate = speed;
            document.getElementById('fv-spd').textContent = speed.toFixed(2) + 'x';
            updFader('spd', (speed - 0.5) / 1.5);
        }

        /* ===== PITCH ===== */
        function setPitch(semitones) {
            pitch = Math.max(-12, Math.min(12, semitones));
            pitchRatio = Math.pow(2, pitch / 12);
            var sign = pitch > 0 ? '+' : '';
            document.getElementById('fv-pit').textContent = sign + Math.round(pitch) + ' st';
            updFader('pit', (pitch + 12) / 24);
        }

        function updFader(id, p) {
            var h = Math.max(0, Math.min(100, p * 100));
            document.getElementById('ff-' + id).style.height = h + '%';
            document.getElementById('fh-' + id).style.bottom = h + '%';
        }

        /* ===== EQ ===== */
        function setEQ(band, db) {
            db = Math.max(-12, Math.min(12, db));
            if (band === 'hi') { eqH = db; if (hiF) hiF.gain.value = db; }
            else if (band === 'mid') { eqM = db; if (midF) midF.gain.value = db; }
            else { eqL = db; if (loF) loF.gain.value = db; }
            var s = db > 0 ? '+' : '';
            document.getElementById('v-' + band).textContent = s + Math.round(db) + ' dB';
        }

        /* ===== SFX ===== */
        function hitPad(i) {
            var s = sfx[i];
            var el = document.querySelector('.fx-pad[data-i="' + i + '"]');
            if (el) { el.classList.add('hit'); setTimeout(function() { el.classList.remove('hit'); }, 350); }
            if (activeFx === 0 && gainNode && playing) { origGain = gainNode.gain.value; gainNode.gain.value = origGain * 0.25; }
            activeFx++;
            var a = new Audio(s.url); a.volume = 0.6;
            a.play().catch(function() { activeFx--; restoreVol(); });
            a.onended = function() { activeFx--; restoreVol(); };
            a.onerror = function() { activeFx--; restoreVol(); };
        }
        function restoreVol() {
            if (activeFx <= 0 && gainNode && playing) {
                var g = calcGain(vol);
                if (curIdx >= 0 && tracks[curIdx].name === 'Classical') g = g * 8;
                gainNode.gain.value = g;
                activeFx = 0;
            }
        }

        /* ===== WAVEFORM ===== */
        function genWF(seed) {
            var h = 0;
            for (var i = 0; i < seed.length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
            var rng = function() { h = (h * 1103515245 + 12345) & 0x7fffffff; return h / 0x7fffffff; };
            wfData = new Float32Array(200);
            var pv = 0.3;
            for (var j = 0; j < 200; j++) { var tg = 0.15 + rng() * 0.7; pv += (tg - pv) * (0.2 + rng() * 0.3); wfData[j] = pv; }
        }
        function drawWF() {
            var cv = document.getElementById('wave-cv');
            var ctx = cv.getContext('2d');
            var r = cv.parentElement.getBoundingClientRect();
            var dpr = window.devicePixelRatio || 1;
            cv.width = r.width * dpr; cv.height = r.height * dpr;
            ctx.scale(dpr, dpr);
            var w = r.width, h = r.height, my = h / 2;
            ctx.clearRect(0, 0, w, h);
            if (!wfData) return;
            var pp = audio && audio.duration ? audio.currentTime / audio.duration : 0;
            var isDark = document.documentElement.classList.contains('dark');
            var bw = w / wfData.length;
            for (var i = 0; i < wfData.length; i++) {
                var x = i * bw, amp = wfData[i] * (my * 0.85);
                if ((i / wfData.length) < pp) {
                    ctx.fillStyle = isDark ? 'rgba(56,152,200,0.8)' : 'rgba(69,137,232,0.7)';
                } else {
                    ctx.fillStyle = isDark ? 'rgba(90,106,122,0.4)' : 'rgba(160,180,200,0.45)';
                }
                ctx.fillRect(x, my - amp, Math.max(1, bw - 1), amp * 2);
            }
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, my); ctx.lineTo(w, my); ctx.stroke();
        }

        /* ===== VU ===== */
        function updVU() {
            var lv = 0;
            if (analyser && playing) {
                var d = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(d);
                var sm = 0; for (var i = 0; i < d.length; i++) sm += d[i];
                lv = sm / (d.length * 255);
                if (lv < 0.001 && playing) lv = 0.4 + Math.random() * 0.3;
            } else if (playing) { lv = 0.3 + Math.random() * 0.25; }
            vuCh(document.getElementById('vu-l'), Math.min(1, lv * (0.9 + Math.random() * 0.2)));
            vuCh(document.getElementById('vu-r'), Math.min(1, lv * (0.9 + Math.random() * 0.2)));
        }
        function vuCh(el, lv) {
            var segs = el.querySelectorAll('.vu-s');
            var lit = Math.round(lv * segs.length);
            segs.forEach(function(s, i) {
                s.className = 'vu-s';
                if (i < lit) { if (i >= segs.length - 2) s.classList.add('r'); else if (i >= segs.length - 4) s.classList.add('a'); else s.classList.add('g'); }
            });
        }

        /* ===== VIS LOOP ===== */
        function startVis() { if (rafId) return; function f() { drawWF(); updVU(); jogSpin(); rafId = requestAnimationFrame(f); } f(); }
        function jogSpin() {
            if (!playing) return;
            jogA = (jogA + 2 * speed) % 360;
            var s = document.getElementById('jog-spin');
            if (s) s.style.transform = 'rotate(' + jogA + 'deg)';
        }

        /* ===== JOG WHEEL ===== */
        function setupJog() {
            var el = document.getElementById('jog');
            var drag = false, la = 0;
            function ang(cx, cy) { var r = el.getBoundingClientRect(); return Math.atan2(cy - (r.top + r.height / 2), cx - (r.left + r.width / 2)) * (180 / Math.PI); }
            function s(cx, cy, e) { e.preventDefault(); drag = true; la = ang(cx, cy); }
            function m(cx, cy, e) {
                if (!drag || !audio || !audio.duration) return; e.preventDefault();
                var a = ang(cx, cy), d = a - la;
                if (d > 180) d -= 360; if (d < -180) d += 360;
                audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + (d / 360) * 10));
                la = a;
            }
            function en() { drag = false; }
            el.addEventListener('mousedown', function(e) { s(e.clientX, e.clientY, e); });
            document.addEventListener('mousemove', function(e) { m(e.clientX, e.clientY, e); });
            document.addEventListener('mouseup', en);
            el.addEventListener('touchstart', function(e) { if (e.touches[0]) s(e.touches[0].clientX, e.touches[0].clientY, e); });
            document.addEventListener('touchmove', function(e) { if (drag && e.touches[0]) m(e.touches[0].clientX, e.touches[0].clientY, e); }, { passive: false });
            document.addEventListener('touchend', en);
        }

        /* ===== FADER SETUP ===== */
        function setupFader(tid, cb) {
            var wrap = document.getElementById(tid);
            var tr = wrap.querySelector('.f-track') || wrap;
            var drag = false;
            function cv(cy) { var r = tr.getBoundingClientRect(); return Math.max(0, Math.min(1, 1 - ((cy - r.top) / r.height))); }
            function s(cy, e) { e.preventDefault(); drag = true; cb(cv(cy)); }
            function m(cy, e) { if (!drag) return; e.preventDefault(); cb(cv(cy)); }
            function en() { drag = false; }
            wrap.addEventListener('mousedown', function(e) { s(e.clientY, e); });
            document.addEventListener('mousemove', function(e) { if (drag) m(e.clientY, e); });
            document.addEventListener('mouseup', en);
            wrap.addEventListener('touchstart', function(e) { if (e.touches[0]) s(e.touches[0].clientY, e); });
            document.addEventListener('touchmove', function(e) { if (drag && e.touches[0]) { e.preventDefault(); m(e.touches[0].clientY, e); } }, { passive: false });
            document.addEventListener('touchend', en);
        }

        /* ===== EQ SLIDER SETUP ===== */
        function updEQSlider(band, db) {
            var pct = ((db + 12) / 24) * 100;
            var thumb = document.getElementById('kh-' + band);
            var fill = document.getElementById('kf-' + band);
            if (thumb) thumb.style.left = pct + '%';
            if (fill) {
                if (db >= 0) { fill.style.left = '50%'; fill.style.width = ((db / 12) * 50) + '%'; }
                else { var w = (Math.abs(db) / 12) * 50; fill.style.left = (50 - w) + '%'; fill.style.width = w + '%'; }
            }
        }

        function setupEQSlider(sid, band) {
            var sl = document.getElementById(sid);
            var drag = false;
            function calcDB(cx) { var r = sl.getBoundingClientRect(); var pct = Math.max(0, Math.min(1, (cx - r.left) / r.width)); return (pct * 24) - 12; }
            function apply(cx) { var db = calcDB(cx); setEQ(band, db); updEQSlider(band, db); }
            function onStart(cx, e) { e.preventDefault(); drag = true; apply(cx); }
            function onMove(cx, e) { if (!drag) return; e.preventDefault(); apply(cx); }
            function onEnd() { drag = false; }
            sl.addEventListener('mousedown', function(e) { onStart(e.clientX, e); });
            document.addEventListener('mousemove', function(e) { if (drag) onMove(e.clientX, e); });
            document.addEventListener('mouseup', onEnd);
            sl.addEventListener('touchstart', function(e) { if (e.touches[0]) onStart(e.touches[0].clientX, e); });
            document.addEventListener('touchmove', function(e) { if (drag && e.touches[0]) { e.preventDefault(); onMove(e.touches[0].clientX, e); } }, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        /* ===== SEEK ===== */
        function setupSeek() {
            var bar = document.getElementById('t-bar');
            var ww = document.getElementById('wave-wrap');
            var drag = false;
            function sk(cx, el) { if (!audio || !audio.duration) return; var r = el.getBoundingClientRect(); audio.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * audio.duration; }
            [bar, ww].forEach(function(el) {
                el.addEventListener('mousedown', function(e) { e.preventDefault(); drag = true; sk(e.clientX, el); });
                el.addEventListener('touchstart', function(e) { if (e.touches[0]) { drag = true; sk(e.touches[0].clientX, el); } });
            });
            document.addEventListener('mousemove', function(e) { if (drag) sk(e.clientX, bar); });
            document.addEventListener('touchmove', function(e) { if (drag && e.touches[0]) sk(e.touches[0].clientX, bar); });
            document.addEventListener('mouseup', function() { drag = false; });
            document.addEventListener('touchend', function() { drag = false; });
        }

        /* ===== HELPERS ===== */
        function fmt(s) { if (!s || isNaN(s)) return '0:00'; var m = Math.floor(s / 60), sc = Math.floor(s % 60); return m + ':' + (sc < 10 ? '0' : '') + sc; }
        function hlTrack() { document.querySelectorAll('.lib-card').forEach(function(c, i) { if (i === curIdx) c.classList.add('on'); else c.classList.remove('on'); }); }

        /* ===== BUILD UI ===== */
        function buildVU() {
            ['vu-l', 'vu-r'].forEach(function(id) {
                var ch = document.getElementById(id);
                for (var i = 0; i < 8; i++) { var s = document.createElement('div'); s.className = 'vu-s'; ch.appendChild(s); }
            });
        }
        function buildPads() {
            var g = document.getElementById('pads');
            sfx.forEach(function(s, i) {
                var b = document.createElement('button');
                var nameKey = s.name.toLowerCase();
                b.className = 'fx-pad'; b.setAttribute('data-i', i); b.setAttribute('data-c', s.c); b.setAttribute('data-key', nameKey);
                b.innerHTML = '<span class="p-led"></span><span class="pad-txt">' + t(nameKey) + '</span>';
                b.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); hitPad(i); });
                g.appendChild(b);
            });
        }
        function buildLib() {
            var g = document.getElementById('lib');
            tracks.forEach(function(tr, i) {
                var c = document.createElement('div');
                c.className = 'lib-card';
                c.setAttribute('data-genre', tr.genre);
                c.innerHTML = '<div class="lc-name">' + tr.name + '</div><div class="lc-genre">' + t(tr.genre) + '</div><div class="lc-led"></div>';
                c.addEventListener('click', function() { loadTrack(i); });
                g.appendChild(c);
            });
        }

        /* ===== LANGUAGE ===== */
        function applyLang() {
            document.querySelector('.logo').textContent = t('logo');
            document.querySelector('.dev-tag').textContent = t('devTag');
            updateLangSwitch();
            if (curIdx < 0) {
                document.getElementById('trk-name').textContent = t('noTrack');
                document.getElementById('trk-genre').textContent = t('selectLib');
            } else {
                document.getElementById('trk-genre').textContent = t(tracks[curIdx].genre);
            }
            document.querySelector('.bpm-lbl').textContent = t('bpm');
            document.getElementById('b-cue').textContent = t('cue');
            document.getElementById('b-prev').textContent = t('prev');
            document.getElementById('b-next').textContent = t('next');
            updTransport();
            document.querySelector('.jog-in span').textContent = t('jog');
            var eqLabels = document.querySelectorAll('.eq-lbl');
            if (eqLabels[0]) eqLabels[0].textContent = t('hi');
            if (eqLabels[1]) eqLabels[1].textContent = t('mid');
            if (eqLabels[2]) eqLabels[2].textContent = t('lo');
            var fLabels = document.querySelectorAll('.f-lbl');
            if (fLabels[0]) fLabels[0].textContent = t('vol');
            if (fLabels[1]) fLabels[1].textContent = t('spd');
            if (fLabels[2]) fLabels[2].textContent = t('pitch');
            document.querySelectorAll('.f-rst').forEach(function(btn) { btn.textContent = t('rst'); });
            document.querySelector('.lib-lbl').textContent = t('library');
            document.querySelectorAll('.lib-card').forEach(function(card) {
                var genre = card.getAttribute('data-genre');
                if (genre) { var genreEl = card.querySelector('.lc-genre'); if (genreEl) genreEl.textContent = t(genre); }
            });
            document.querySelectorAll('.fx-pad').forEach(function(pad) {
                var key = pad.getAttribute('data-key');
                if (key) { var txt = pad.querySelector('.pad-txt'); if (txt) txt.textContent = t(key); }
            });
        }
        function updateLangSwitch() {
            var enEl = document.getElementById('lang-en');
            var zhEl = document.getElementById('lang-zh');
            var slider = document.getElementById('lang-slider');
            if (curLang === 'en') {
                enEl.classList.add('active');
                zhEl.classList.remove('active');
                slider.style.left = enEl.offsetLeft + 'px';
                slider.style.width = enEl.offsetWidth + 'px';
            } else {
                zhEl.classList.add('active');
                enEl.classList.remove('active');
                slider.style.left = zhEl.offsetLeft + 'px';
                slider.style.width = zhEl.offsetWidth + 'px';
            }
        }
        function toggleLang() { curLang = curLang === 'en' ? 'zh' : 'en'; applyLang(); }

        /* ===== INIT ===== */
        document.addEventListener('DOMContentLoaded', function() {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) { if (e.matches) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); });

            buildVU(); buildPads(); buildLib();
            document.getElementById('lang-switch').addEventListener('click', toggleLang);
            updateLangSwitch();
            document.getElementById('b-play').addEventListener('click', togglePlay);
            document.getElementById('b-cue').addEventListener('click', cue);
            document.getElementById('b-prev').addEventListener('click', prev);
            document.getElementById('b-next').addEventListener('click', next);

            setupFader('ft-vol', setVol);
            setupFader('ft-spd', function(v) { setSpeed(0.5 + v * 1.5); });
            setupFader('ft-pit', function(v) {
                var st = (v * 24) - 12;
                if (st > -0.5 && st < 0.5) st = 0;
                setPitch(st);
            });

            document.getElementById('rst-vol').addEventListener('click', function() { setVol(0.5); });
            document.getElementById('rst-spd').addEventListener('click', function() { setSpeed(1.0); });
            document.getElementById('rst-pit').addEventListener('click', function() { setPitch(0); });

            setupEQSlider('k-hi', 'hi'); setupEQSlider('k-mid', 'mid'); setupEQSlider('k-lo', 'lo');
            updEQSlider('hi', 0); updEQSlider('mid', 0); updEQSlider('lo', 0);
            setupJog(); setupSeek();

            updFader('vol', 0.5);
            updFader('spd', (1.0 - 0.5) / 1.5);
            updFader('pit', 0.5);

            window.addEventListener('resize', function() { if (wfData) drawWF(); });
            startVis();
        });
    </script>
</body>
</html>
